<!DOCTYPE html>
><html lang="ja">
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>漢字アプリ</title>

  <script src="https://unpkg.com/react@18/umd/react.development.jsscript src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    function App() {
      return (
        <div style={{ padding: 20, fontFamily: "sans-serif" }}>
          <h1>漢字アプリ テスト表示</h1>
          <p>ここが表示されたら、HTMLタグは正しく貼れています。</p>

    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App />);
  </script>
