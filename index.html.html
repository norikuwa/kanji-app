<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>漢字アプリ（オフライン版）</title>
<style>
:root {
  --bg: #f8fafc;
  --card: #ffffff;
  --text: #111827;
  --sub: #6b7280;
  --line: #d1d5db;
  --green-soft: #f0fdf4;
  --blue-soft: #eff6ff;
  --yellow-soft: #fef3c7;
}
* { box-sizing: border-box; }
html, body {
  margin: 0;
  padding: 0;
  background: var(--bg);
  color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", sans-serif;
  -webkit-text-size-adjust: 100%;
}
body { min-height: 100vh; }
.wrap { max-width: 820px; margin: 0 auto; padding: 16px; }
.card {
  background: var(--card);
  border: 1px solid var(--line);
  border-radius: 16px;
  padding: 16px;
}
h1, h2, h3, p { margin: 0; }
.row { display: flex; gap: 8px; flex-wrap: wrap; }
.badge {
  background: white;
  border: 1px solid var(--line);
  border-radius: 10px;
  padding: 6px 10px;
  font-size: 14px;
}
.btn {
  border: 1px solid var(--line);
  background: white;
  color: var(--text);
  border-radius: 12px;
  padding: 10px 14px;
  font-size: 18px;
  cursor: pointer;
}
.btn:disabled { opacity: 0.5; cursor: default; }
.btn.green { background: #ecfccb; }
.btn.yellow { background: #fef3c7; }
.btn.red { background: #fee2e2; }
.btn.blue { background: #dbeafe; }
.progress {
  width: 100%;
  height: 16px;
  background: #e5e7eb;
  border-radius: 999px;
  overflow: hidden;
}
.progress > div {
  height: 100%;
  background: #22c55e;
  width: 0%;
  transition: width 0.2s ease;
}
.muted { color: var(--sub); }
.topspace { margin-top: 12px; }
.big { font-size: 28px; }
.answer-font {
  font-family: "UD Digi Kyokasho N-R", "UD デジタル 教科書体 N-R",
               "YuKyokasho Yoko", "YuKyokasho", "Hiragino Mincho ProN", serif;
}
canvas {
  border: 1px solid var(--line);
  width: 100%;
  height: 420px;
  display: block;
  border-radius: 12px;
  background: white;
  touch-action: none;
  user-select: none;
  -webkit-user-select: none;
}
.choice { min-width: 140px; min-height: 140px; font-size: 56px; border-radius: 16px; }
.panel { border-radius: 16px; padding: 16px; }
.panel.blue { background: var(--blue-soft); border: 2px solid #93c5fd; }
.panel.green { background: var(--green-soft); border: 2px solid #86efac; }
.panel.note { background: #fafafa; border: 2px dashed var(--line); }
.small { font-size: 13px; }
@media (max-width: 640px) {
  .btn { font-size: 17px; }
  .big { font-size: 24px; }
  .choice { min-width: 120px; min-height: 120px; font-size: 48px; }
  .wrap { padding: 12px; }
}
</style>
</head>
<body>
<div class="wrap">
  <div class="card">
    <h1 style="margin-bottom:8px;">漢字チャレンジ（オフライン版）</h1>
    <div class="muted" style="margin-bottom:12px;">5題ずつ / 3回「できた」で卒業 / ネット接続なしで動作</div>
    <div class="row" id="badges"></div>
    <div id="modeSummary" class="muted topspace"></div>
    <div class="row topspace">
      <button class="btn" id="btnWrite">✏️ かくモード</button>
      <button class="btn" id="btnSpot">✅ せいかいタップ</button>
      <button class="btn blue" id="btnMixed">🔄 5問やり直す</button>
      <button class="btn" id="btnMistakesOnly">❗ 間違えたものだけ</button>
    </div>
    <div class="topspace" id="progressText"></div>
    <div class="progress topspace"><div id="progressBar"></div></div>
    <div id="mainArea" class="topspace"></div>
  </div>
</div>
<script>
(function(){
'use strict';
const RAW_KANJI_TEXT = `
め（木のめ）,芽
れい（れい題）,例
ひょう（目ひょう）,標
さい（野さい）,菜
けん（けん設）,建
たい（熱たい）,帯
ひ（ひ行機）,飛
たつ（たつ人）,達
しん（しんじる）,信
くん（くん読み）,訓
せい（せい功）,成
ぐん（ぐん馬）,群
ろく（ろく音）,録
じゅん（じゅん番）,順
てん（のり子）,典
し（つかさ）,司
き（き械）,機
るい（種るい）,類
けい（けい品）,景
しょ（はじめて）,初
きょう（東きょう）,京
ざん（のこり）,残
さく（さく年）,昨
かん（かん東）,関
しん（大じん）,臣
かん（かん想）,感
さい（さい開）,再
いん（しるし）,印
ぎょ（りょう師）,漁
よ（あまり）,余
さい（さい玉）,埼
とち（とち木）,栃
しん（ふかい）,深
ふ（大阪ふ）,府
てき（まと）,的
ひつ（ひつ要）,必
でん（つたえる）,伝
こ（かたまる）,固
りょう（分りょう）,量
なし（山なし）,梨
い（いのうえ）,井
まち（ちょう）,町
ご（うしろ）,後
めい（あかるい）,明
い（いじょう）,以
ざい（ざい料）,材
り（り用）,利
はた（国き）,旗
かん（みる）,観
ぎ（会ぎ）,議
し（ためす）,試
せつ（せつ明）,説
`.trim();

const BATCH_SIZE = 5;
const MISTAKE_MIX_COUNT = 2;
const MASTER_PASS_COUNT = 3;
const CHECKPOINT = 5;
const STORAGE_KEY_MISTAKES = 'kanji_mistakes_offline_v1';
const STORAGE_KEY_BEST = 'kanji_best_score_offline_v1';
const STORAGE_KEY_MASTERIES = 'kanji_masteries_offline_v1';

function parseKanjiText(t) {
  return t.split(/\r?\n/).map(l=>l.trim()).filter(Boolean).map((l,i)=>{
    const p = l.split(',').map(s=>s.trim());
    return { id:i+1, yomi:p[0]||'', kanji:p[1]||'' };
  }).filter(x=>x.yomi&&x.kanji);
}
function shuffle(a){const c=[...a];for(let i=c.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[c[i],c[j]]=[c[j],c[i]];}return c;}
function uniqueById(a){const s=new Set();return a.filter(x=>{if(s.has(x.id))return false;s.add(x.id);return true;});}
function getLearning(all,m){return all.filter(q=>(m[q.id]||0)<MASTER_PASS_COUNT);}
function buildMixedDeck(all,mistakes,mast){
  const lq=uniqueById(getLearning(all,mast));
  const ms=new Set(mistakes);
  const mq=shuffle(lq.filter(q=>ms.has(q.id)));
  const nq=shuffle(lq.filter(q=>!ms.has(q.id)));
  const mp=mq.slice(0,MISTAKE_MIX_COUNT);
  const np=nq.slice(0,Math.max(BATCH_SIZE-mp.length,0));
  return shuffle([...mp,...np]).slice(0,Math.min(BATCH_SIZE,lq.length));
}
function buildMistakeOnly(all,mistakes,mast){
  const ms=new Set(mistakes);
  return shuffle(getLearning(all,mast).filter(q=>ms.has(q.id))).slice(0,BATCH_SIZE);
}
function getCheckpoint(a){return a===5?'5問クリア！いったんおしまいでもOK。':'';}
function randomWrong(cur,all,mast){
  const pool=getLearning(all,mast);
  const sl=pool.filter(x=>x.kanji!==cur.kanji&&x.kanji.length===cur.kanji.length);
  if(sl.length>0)return sl[Math.floor(Math.random()*sl.length)].kanji;
  const fb=pool.filter(x=>x.kanji!==cur.kanji);
  if(fb.length>0)return fb[Math.floor(Math.random()*fb.length)].kanji;
  return cur.kanji;
}

const state = {
  baseQuestions: parseKanjiText(RAW_KANJI_TEXT),
  deck:[], index:0, showAnswer:false, score:0, bestScore:0,
  mistakes:[], masteries:{}, playMode:'write', reviewMode:'mixed',
  finished:false, choices:[], showCheckpoint:false, checkpointMessage:'',
  drawingSnapshot:null, activePointerId:null
};

const ui = {
  badges: document.getElementById('badges'),
  modeSummary: document.getElementById('modeSummary'),
  progressText: document.getElementById('progressText'),
  progressBar: document.getElementById('progressBar'),
  mainArea: document.getElementById('mainArea'),
  btnWrite: document.getElementById('btnWrite'),
  btnSpot: document.getElementById('btnSpot'),
  btnMixed: document.getElementById('btnMixed'),
  btnMistakesOnly: document.getElementById('btnMistakesOnly')
};

function loadStorage(){
  try{state.mistakes=JSON.parse(localStorage.getItem(STORAGE_KEY_MISTAKES)||'[]');}catch{state.mistakes=[];}
  const b=Number(localStorage.getItem(STORAGE_KEY_BEST)||0);
  state.bestScore=Number.isFinite(b)?b:0;
  try{state.masteries=JSON.parse(localStorage.getItem(STORAGE_KEY_MASTERIES)||'{}');}catch{state.masteries={};}
}
function saveStorage(){
  localStorage.setItem(STORAGE_KEY_MISTAKES,JSON.stringify(state.mistakes));
  localStorage.setItem(STORAGE_KEY_BEST,String(state.bestScore));
  localStorage.setItem(STORAGE_KEY_MASTERIES,JSON.stringify(state.masteries));
}
function escapeHtml(t){return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#039;');}
function learningCount(){return getLearning(state.baseQuestions,state.masteries).length;}
function masteredCount(){return state.baseQuestions.length-learningCount();}
function mixedMistakeCount(){
  const lq=getLearning(state.baseQuestions,state.masteries);
  return Math.min(MISTAKE_MIX_COUNT,lq.filter(x=>state.mistakes.includes(x.id)).length,state.deck.length);
}
function currentQ(){return state.deck[state.index]||null;}
function currentMastery(){const q=currentQ();return q?(state.masteries[q.id]||0):0;}

function saveCanvas(){
  const c=document.getElementById('writeCanvas'); if(!c)return;
  try{state.drawingSnapshot=c.toDataURL('image/png');}catch{state.drawingSnapshot=null;}
}
function restoreCanvas(){
  const c=document.getElementById('writeCanvas'); if(!c||!state.drawingSnapshot)return;
  const ctx=c.getContext('2d');
  const img=new Image();
  img.onload=()=>{const r=c.getBoundingClientRect();ctx.clearRect(0,0,r.width,r.height);ctx.drawImage(img,0,0,r.width,r.height);};
  img.src=state.drawingSnapshot;
}
function resizeCanvas(){
  const c=document.getElementById('writeCanvas'); if(!c)return;
  const r=c.getBoundingClientRect(); if(!r.width||!r.height)return;
  const dpr=window.devicePixelRatio||1;
  c.width=Math.round(r.width*dpr); c.height=Math.round(r.height*dpr);
  const ctx=c.getContext('2d');
  ctx.setTransform(dpr,0,0,dpr,0,0);
  ctx.lineWidth=6; ctx.lineCap='round'; ctx.lineJoin='round'; ctx.strokeStyle='#111827';
}
function clearCanvas(){
  const c=document.getElementById('writeCanvas'); if(!c)return;
  const ctx=c.getContext('2d'); const r=c.getBoundingClientRect();
  ctx.clearRect(0,0,r.width,r.height); state.drawingSnapshot=null;
}
function getPos(e){
  const c=document.getElementById('writeCanvas'); if(!c)return{x:0,y:0};
  const r=c.getBoundingClientRect();
  return{x:(e.clientX||0)-r.left,y:(e.clientY||0)-r.top};
}
function startDraw(e){
  e.preventDefault();
  const c=document.getElementById('writeCanvas'); if(!c)return;
  state.activePointerId=e.pointerId;
  try{c.setPointerCapture(e.pointerId);}catch(_){}
  const ctx=c.getContext('2d'); const p=getPos(e);
  ctx.beginPath(); ctx.moveTo(p.x,p.y);
  c.dataset.drawing='1';
}
function moveDraw(e){
  e.preventDefault();
  const c=document.getElementById('writeCanvas'); if(!c||c.dataset.drawing!=='1')return;
  if(state.activePointerId!==null&&e.pointerId!==state.activePointerId)return;
  const ctx=c.getContext('2d'); const p=getPos(e);
  ctx.lineTo(p.x,p.y); ctx.stroke();
}
function endDraw(e){
  if(e&&e.preventDefault)e.preventDefault();
  const c=document.getElementById('writeCanvas'); if(!c)return;
  if(state.activePointerId!==null&&e.pointerId!==state.activePointerId)return;
  c.dataset.drawing='0'; state.activePointerId=null;
  try{if(e.pointerId!==undefined)c.releasePointerCapture(e.pointerId);}catch(_){}
  saveCanvas();
}
function attachCanvasEvents(){
  const c=document.getElementById('writeCanvas'); if(!c)return;
  resizeCanvas();
  c.addEventListener('pointerdown',startDraw);
  c.addEventListener('pointermove',moveDraw);
  c.addEventListener('pointerup',endDraw);
  c.addEventListener('pointercancel',endDraw);
  c.addEventListener('pointerleave',endDraw);
  if(state.showAnswer)setTimeout(restoreCanvas,0);
}
function buildChoices(){
  const q=currentQ(); if(!q)return[];
  const w=randomWrong(q,state.baseQuestions,state.masteries);
  return shuffle([{label:q.kanji,type:'correct'},{label:w,type:'wrong'}]);
}
function startRound(nr=state.reviewMode,np=state.playMode){
  const list = nr==='mistakesOnly'
    ? buildMistakeOnly(state.baseQuestions,state.mistakes,state.masteries)
    : buildMixedDeck(state.baseQuestions,state.mistakes,state.masteries);
  state.reviewMode=nr; state.playMode=np; state.deck=list; state.index=0; state.score=0;
  state.finished=list.length===0; state.showAnswer=false; state.showCheckpoint=false;
  state.checkpointMessage=''; state.drawingSnapshot=null; state.activePointerId=null;
  state.choices = np==='spot'?buildChoices():[];
  render();
}
function updateMistakes(id,ok){
  const s=new Set(state.mistakes);
  if(ok)s.delete(id); else s.add(id);
  if((state.masteries[id]||0)>=MASTER_PASS_COUNT)s.delete(id);
  state.mistakes=[...s]; saveStorage();
}
function incrementMastery(id){
  state.masteries[id]=Math.min((state.masteries[id]||0)+1,MASTER_PASS_COUNT);
  if(state.masteries[id]>=MASTER_PASS_COUNT){
    state.mistakes=state.mistakes.filter(x=>x!==id);
  }
  saveStorage();
}
function maybeBest(s){if(s>state.bestScore){state.bestScore=s;saveStorage();}}
function nextAfterAnswer(){
  const a=state.index+1;
  if(a>=state.deck.length){state.finished=true;render();return;}
  if(a%CHECKPOINT===0){
    state.checkpointMessage=getCheckpoint(a);
    state.showCheckpoint=true; state.showAnswer=false; clearCanvas(); render(); return;
  }
  state.index+=1; state.showAnswer=false;
  state.choices = state.playMode==='spot'?buildChoices():[];
  render();
}
function gradeWrite(point,ok){
  const q=currentQ(); if(!q)return;
  state.score+=point; updateMistakes(q.id,ok);
  if(ok&&point===2)incrementMastery(q.id);
  maybeBest(state.score); clearCanvas(); nextAfterAnswer();
}
function answerSpot(type){
  const q=currentQ(); if(!q)return;
  const ok=type==='correct';
  state.score+=ok?2:0; updateMistakes(q.id,ok);
  maybeBest(state.score); nextAfterAnswer();
}
function onResize(){
  if(state.playMode==='write'&&!state.finished&&!state.showCheckpoint){
    saveCanvas(); resizeCanvas(); restoreCanvas();
  }
}
function bind(){
  ui.btnWrite.addEventListener('click',()=>startRound(state.reviewMode,'write'));
  ui.btnSpot.addEventListener('click',()=>startRound(state.reviewMode,'spot'));
  ui.btnMixed.addEventListener('click',()=>startRound('mixed',state.playMode));
  ui.btnMistakesOnly.addEventListener('click',()=>{
    if(state.mistakes.length===0)return;
    startRound('mistakesOnly',state.playMode);
  });
  window.addEventListener('resize',onResize);
}
function badge(label,value,bg){
  return `<div class="badge" style="background:${bg}">${label}: <strong>${escapeHtml(String(value))}</strong></div>`;
}
function renderBadges(){
  ui.badges.innerHTML=[
    badge('スコア',state.score,'white'),
    badge('ベスト',state.bestScore,'white'),
    badge('苦手メモ',`${state.mistakes.length}問`,'var(--yellow-soft)'),
    badge('習得ずみ',`${masteredCount()}問`,'var(--green-soft)'),
    badge('のこり',`${learningCount()}問`,'var(--blue-soft)')
  ].join('');
}
function renderSummary(){
  if(state.reviewMode==='mistakesOnly'){
    ui.modeSummary.textContent=`今のモード: 間違えたものだけ（今回 ${state.deck.length}問）`;
  }else{
    ui.modeSummary.textContent=`今回の出題: ${state.deck.length}問（うち苦手ミックス最大 ${mixedMistakeCount()}問）`;
  }
}
function renderProgress(){
  const p=state.deck.length?Math.round(((state.finished?state.deck.length:state.index)/state.deck.length)*100):0;
  ui.progressText.textContent=`進みぐあい: ${state.finished?state.deck.length:state.index} / ${state.deck.length}（${p}%）`;
  ui.progressBar.style.width=`${p}%`;
}
function updateButtons(){ ui.btnMistakesOnly.disabled=state.mistakes.length===0; }
function renderAnswerArea(){
  const a=document.getElementById('answerArea'); const q=currentQ();
  if(!a||!q)return;
  if(!state.showAnswer){a.innerHTML='';return;}
  a.innerHTML=`
    <div class="topspace">
      <div class="answer-font" style="font-size:40px;margin-bottom:10px;">${escapeHtml(q.kanji)}</div>
      <div class="row">
        <button class="btn green" id="btnGood">できた +2</button>
        <button class="btn yellow" id="btnClose">おしい +1</button>
        <button class="btn red" id="btnBad">ダメ 0</button>
      </div>
      <div class="muted small topspace">「できた」を3回で、この問題は出題から外れます。</div>
    </div>`;
  document.getElementById('btnGood').onclick=()=>gradeWrite(2,true);
  document.getElementById('btnClose').onclick=()=>gradeWrite(1,false);
  document.getElementById('btnBad').onclick=()=>gradeWrite(0,false);
  setTimeout(restoreCanvas,0);
}
function renderMain(){
  const q=currentQ();
  if(state.finished){
    ui.mainArea.innerHTML=`
      <div class="panel green">
        <h3 style="margin-top:0;">${state.reviewMode==='mistakesOnly'?'間違えたものだけクリア！':'5問クリア！'}</h3>
        <div style="font-size:20px;margin-top:8px;">今回のスコア: ${state.score}</div>
        <div style="margin-top:8px;">ベストスコア: ${Math.max(state.bestScore,state.score)}</div>
        <div style="margin-top:8px;">残っている問題: ${learningCount()}問</div>
        <div style="margin-top:8px;">習得ずみ（3回できた）: ${masteredCount()}問</div>
        <div class="row topspace">
          <button class="btn" id="btnNextBatch">次の5問へ</button>
          <button class="btn" id="btnBackNormal">通常モードへ</button>
          <button class="btn" id="btnResetAll">苦手・習得をリセット</button>
        </div>
      </div>`;
    document.getElementById('btnNextBatch').onclick=()=>startRound(state.reviewMode,state.playMode);
    document.getElementById('btnBackNormal').onclick=()=>startRound('mixed',state.playMode);
    document.getElementById('btnResetAll').onclick=()=>{state.mistakes=[];state.masteries={};saveStorage();startRound('mixed',state.playMode);};
    return;
  }
  if(state.showCheckpoint){
    ui.mainArea.innerHTML=`
      <div class="panel blue">
        <h3 style="margin-top:0;">ここでひと休み</h3>
        <div style="font-size:20px;margin-top:8px;">${escapeHtml(state.checkpointMessage)}</div>
        <div style="margin-top:8px;">いま ${state.index+1} / ${state.deck.length}問まで完了。スコア ${state.score}</div>
        <button class="btn topspace" id="btnContinue">つづける</button>
      </div>`;
    document.getElementById('btnContinue').onclick=()=>{
      state.showCheckpoint=false; state.checkpointMessage='';
      state.index+=1; state.showAnswer=false;
      state.drawingSnapshot=null; state.activePointerId=null;
      state.choices=state.playMode==='spot'?buildChoices():[];
      render();
    };
    return;
  }
  if(!q){
    ui.mainArea.innerHTML=`
      <div class="panel note">
        ${learningCount()===0?'ぜんぶ3回クリアです！おめでとう！':
          state.mistakes.length===0?'まだ間違い記録がありません。通常モードでまず1回やってみてください。':
          '問題がありません。もう一度モードを切り替えてください。'}
      </div>`;
    return;
  }
  if(state.playMode==='write'){
    ui.mainArea.innerHTML=`
      <div style="font-size:20px;margin-bottom:10px;">問題 ${state.index+1} / ${state.deck.length}</div>
      <div class="big" style="margin-bottom:8px;">読み: ${escapeHtml(q.yomi)}</div>
      <div class="muted small" style="margin-bottom:12px;">この字の習得回数: ${currentMastery()} / ${MASTER_PASS_COUNT}</div>
      <canvas id="writeCanvas"></canvas>
      <div class="row topspace">
        <button class="btn" id="btnClear">消す</button>
        <button class="btn" id="btnShowAnswer">答え</button>
      </div>
      <div id="answerArea"></div>`;
    document.getElementById('btnClear').onclick=()=>{resizeCanvas();clearCanvas();};
    document.getElementById('btnShowAnswer').onclick=()=>{saveCanvas();state.showAnswer=true;renderAnswerArea();};
    attachCanvasEvents();
    renderAnswerArea();
    return;
  }
  state.choices=buildChoices();
  ui.mainArea.innerHTML=`
    <div style="font-size:20px;margin-bottom:10px;">問題 ${state.index+1} / ${state.deck.length}</div>
    <div class="big" style="margin-bottom:8px;">読み: ${escapeHtml(q.yomi)}</div>
    <div class="muted small" style="margin-bottom:12px;">この字の習得回数: ${currentMastery()} / ${MASTER_PASS_COUNT}</div>
    <div style="margin-bottom:12px;font-size:18px;">あっている方をタップしてね</div>
    <div class="row" id="choicesRow"></div>
    <div class="muted small topspace">※ 習得回数が増えるのは「かくモード」で「できた」を押した時です。</div>`;
  const row=document.getElementById('choicesRow');
  state.choices.forEach(c=>{
    const b=document.createElement('button');
    b.className='btn choice answer-font'; b.textContent=c.label;
    b.onclick=()=>answerSpot(c.type); row.appendChild(b);
  });
}
function render(){
  renderBadges(); renderSummary(); renderProgress(); updateButtons(); renderMain();
}
loadStorage(); bind(); startRound('mixed','write');
})();
</script>
</body>
</html>
